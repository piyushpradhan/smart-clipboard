<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Clipboard — Interactive Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body { background: #0a0a0f; font-family: 'Geist', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  #root { height: 100vh; width: 100vw; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="app-state.jsx"></script>
<script type="text/babel" src="palette.jsx"></script>
<script type="text/babel" src="library.jsx"></script>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "accentHue": 285,
  "density": "compact",
  "categoryDisplay": "chip",
  "showLabels": true,
  "fontPair": "geist",
  "previewMode": "split"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAKS);
  const [editMode, setEditMode] = React.useState(false);
  const [hintDismissed, setHintDismissed] = React.useState(false);

  const app = useAppState();

  // Edit-mode protocol.
  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setEditMode(true);
      else if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const update = (key, val) => {
    setTweaks(t => ({ ...t, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  // Global shortcut: ⌘Space or Ctrl+Shift+V opens palette.
  React.useEffect(() => {
    const onKey = (e) => {
      const cmd = e.metaKey || e.ctrlKey;
      if (cmd && e.code === 'Space') {
        e.preventDefault();
        app.setPaletteOpen(p => !p);
      } else if (cmd && e.shiftKey && e.key.toLowerCase() === 'v') {
        e.preventDefault();
        app.setPaletteOpen(p => !p);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const t = buildTheme(tweaks.theme, tweaks.accentHue, tweaks.density, tweaks.fontPair);

  return (
    <div style={{
      width: '100vw', height: '100vh',
      background: t.micaBg,
      position: 'relative',
      overflow: 'hidden',
      fontFamily: t.fontUi,
      color: t.fg,
    }}>
      {/* Desktop backdrop */}
      <DesktopBackdrop t={t}/>

      {/* Main window — Library */}
      {app.libraryOpen && (
        <div style={{
          position: 'absolute',
          top: '6%', left: '50%',
          transform: 'translateX(-50%)',
          width: 'min(1060px, 92vw)',
          height: 'min(680px, 80vh)',
          borderRadius: 12,
          overflow: 'hidden',
          background: t.bgWindow,
          backdropFilter: 'blur(40px) saturate(140%)',
          WebkitBackdropFilter: 'blur(40px) saturate(140%)',
          border: `1px solid ${t.border}`,
          boxShadow: `0 30px 80px -10px rgba(0,0,0,${t.dark ? 0.7 : 0.2}),
                      0 4px 12px rgba(0,0,0,${t.dark ? 0.5 : 0.1})`,
        }}>
          <Library
            t={t}
            showLabels={tweaks.showLabels}
            categoryMode={tweaks.categoryDisplay}
            previewMode={tweaks.previewMode}
            app={app}
          />
        </div>
      )}

      {/* Shortcut hint (dismissable) */}
      {!app.paletteOpen && !hintDismissed && (
        <div style={{
          position: 'absolute', top: 24, right: 24,
          padding: '10px 14px',
          background: t.bgSurface, color: t.fg,
          border: `1px solid ${t.border}`,
          borderRadius: 8,
          fontSize: 12,
          display: 'flex', alignItems: 'center', gap: 10,
          boxShadow: `0 8px 24px rgba(0,0,0,${t.dark ? 0.4 : 0.08})`,
          zIndex: 100,
        }}>
          <span style={{ color: t.fgMuted }}>Press</span>
          <Kbd t={t} accent>⌘</Kbd><Kbd t={t} accent>Space</Kbd>
          <span style={{ color: t.fgMuted }}>to open palette</span>
          <button
            onClick={() => setHintDismissed(true)}
            style={{
              marginLeft: 4,
              background: 'transparent', border: 'none',
              color: t.fgFaint, cursor: 'pointer',
              fontSize: 14, padding: 0, width: 18, height: 18,
            }}>×</button>
        </div>
      )}

      {/* Palette overlay */}
      {app.paletteOpen && (
        <Palette
          t={t}
          showLabels={tweaks.showLabels}
          categoryMode={tweaks.categoryDisplay}
          app={app}
          onClose={() => app.setPaletteOpen(false)}
        />
      )}

      {/* Taskbar */}
      <Taskbar t={t} app={app} tweaks={tweaks}/>

      {/* Toast */}
      {app.toast && <Toast t={t} toast={app.toast}/>}

      {editMode && <TweaksPanel tweaks={tweaks} update={update}/>}
    </div>
  );
}

// ── Desktop backdrop with faux icons ─────────────────────
function DesktopBackdrop({ t }) {
  return (
    <div style={{
      position: 'absolute', inset: 0,
      background: t.micaBg,
      overflow: 'hidden',
    }}>
      {/* grid hint */}
      <div style={{
        position: 'absolute', inset: 0,
        background: `repeating-linear-gradient(
          90deg, transparent 0 240px,
          ${t.dark ? 'rgba(255,255,255,0.015)' : 'rgba(0,0,0,0.01)'} 240px 241px)`,
        opacity: 0.5,
      }}/>
      {/* Fake desktop icons — just subtle shapes for context */}
      <div style={{
        position: 'absolute', top: 32, left: 32,
        display: 'grid', gridTemplateColumns: 'repeat(1, 80px)', gap: 24,
        opacity: 0.5,
      }}>
        {[['My PC', '▣'], ['Recycle', '⌫'], ['Docs', '📁']].map(([l, g]) => (
          <div key={l} style={{
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
            fontSize: 11, color: t.dark ? '#ccc' : '#333',
            fontFamily: t.fontUi,
          }}>
            <div style={{
              width: 44, height: 44, borderRadius: 6,
              background: t.dark ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.5)',
              border: `1px solid ${t.border}`,
              display: 'grid', placeItems: 'center',
              fontSize: 18,
            }}>{g}</div>
            <span>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Taskbar with tray ────────────────────────────────────
function Taskbar({ t, app, tweaks }) {
  const [trayOpen, setTrayOpen] = React.useState(false);
  return (
    <>
      <div style={{
        position: 'absolute', bottom: 8, left: 0, right: 0,
        display: 'flex', justifyContent: 'center', alignItems: 'center',
        pointerEvents: 'none',
        zIndex: 200,
      }}>
        <div style={{
          pointerEvents: 'auto',
          display: 'flex', alignItems: 'center', gap: 4,
          padding: '4px 8px',
          background: t.dark ? 'rgba(28,28,32,0.75)' : 'rgba(255,255,255,0.78)',
          backdropFilter: 'blur(40px) saturate(140%)',
          WebkitBackdropFilter: 'blur(40px) saturate(140%)',
          border: `1px solid ${t.border}`,
          borderRadius: 10,
          boxShadow: `0 6px 20px rgba(0,0,0,${t.dark ? 0.4 : 0.08})`,
          height: 44,
        }}>
          {/* Start */}
          <TaskIcon t={t}>
            <div style={{
              display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 2,
              width: 14, height: 14,
            }}>
              {[0,1,2,3].map(i => <div key={i} style={{
                background: ['#2ab4ff','#2a9cff','#ffb62a','#22cc5b'][i],
                borderRadius: 1,
              }}/>)}
            </div>
          </TaskIcon>
          <TaskIcon t={t}><span style={{ color: t.fgMuted, fontSize: 14 }}>⌕</span></TaskIcon>
          <TaskIcon t={t}><span style={{ color: t.fgMuted, fontSize: 14 }}>⌘</span></TaskIcon>
          <TaskIcon t={t} active>
            <div style={{
              width: 20, height: 20, borderRadius: 4,
              background: t.accent,
              display: 'grid', placeItems: 'center',
              color: '#fff', fontWeight: 700, fontSize: 11,
              fontFamily: t.fontMono,
            }}>✦</div>
          </TaskIcon>
          <TaskIcon t={t}><span style={{ color: t.fgMuted, fontSize: 13 }}>📝</span></TaskIcon>
          <TaskIcon t={t}><span style={{ color: t.fgMuted, fontSize: 13 }}>🖼</span></TaskIcon>
        </div>

        {/* System tray (right side) */}
        <div style={{
          pointerEvents: 'auto',
          position: 'absolute', right: 12, bottom: 8,
          display: 'flex', alignItems: 'center', gap: 4,
          padding: '4px 10px',
          background: t.dark ? 'rgba(28,28,32,0.75)' : 'rgba(255,255,255,0.78)',
          backdropFilter: 'blur(40px) saturate(140%)',
          WebkitBackdropFilter: 'blur(40px) saturate(140%)',
          border: `1px solid ${t.border}`,
          borderRadius: 10,
          boxShadow: `0 6px 20px rgba(0,0,0,${t.dark ? 0.4 : 0.08})`,
          height: 44,
          fontSize: 11, color: t.fgMuted,
        }}>
          <div
            title="Smart Clipboard — click for menu"
            onClick={() => setTrayOpen(o => !o)}
            style={{
              width: 28, height: 28, borderRadius: 5,
              display: 'grid', placeItems: 'center',
              background: trayOpen ? t.bgSelected : 'transparent',
              cursor: 'pointer',
              border: `1px solid ${trayOpen ? t.accent : 'transparent'}`,
              color: t.accent, fontSize: 14, fontWeight: 700,
            }}>✦</div>
          <span style={{ width: 18, textAlign: 'center' }}>⏶</span>
          <span style={{ width: 18, textAlign: 'center' }}>⚐</span>
          <span style={{ width: 18, textAlign: 'center' }}>♫</span>
          <div style={{
            display: 'flex', flexDirection: 'column', alignItems: 'flex-end',
            marginLeft: 8, lineHeight: 1.1,
          }}>
            <span style={{ fontSize: 11 }}>9:41</span>
            <span style={{ fontSize: 10, color: t.fgFaint }}>4/19/2026</span>
          </div>
        </div>
      </div>

      {/* Tray menu popout */}
      {trayOpen && (
        <div
          onClick={() => setTrayOpen(false)}
          style={{
            position: 'absolute', inset: 0, zIndex: 300,
          }}
        >
          <div
            onClick={e => e.stopPropagation()}
            style={{
              position: 'absolute', right: 110, bottom: 60,
              width: 280,
              background: t.bgWindow,
              backdropFilter: 'blur(40px) saturate(140%)',
              WebkitBackdropFilter: 'blur(40px) saturate(140%)',
              border: `1px solid ${t.border}`,
              borderRadius: 10,
              boxShadow: `0 12px 40px rgba(0,0,0,${t.dark ? 0.5 : 0.15})`,
              padding: 6,
              animation: 'trayIn 140ms ease',
            }}
          >
            <TrayHeader t={t} app={app}/>
            <TrayItem t={t} onClick={() => { app.setPaletteOpen(true); setTrayOpen(false); }}
              kbd="⌘Space">Open palette</TrayItem>
            <TrayItem t={t} onClick={() => { app.setLibraryOpen(true); setTrayOpen(false); }}
              kbd="⌘⇧V">Open library</TrayItem>
            <div style={{ height: 1, background: t.borderSoft, margin: '4px 2px' }}/>
            <TrayItem t={t} onClick={() => { app.setLibraryOpen(l => !l); setTrayOpen(false); }}>
              {app.libraryOpen ? 'Hide library window' : 'Show library window'}
            </TrayItem>
            <TrayItem t={t}>Launch at startup <span style={{ color: t.accent, fontSize: 11, marginLeft: 'auto' }}>ON</span></TrayItem>
            <TrayItem t={t} onClick={() => { if (confirm('Clear all clipboard history?')) location.reload(); }}>
              Clear history…
            </TrayItem>
            <div style={{ height: 1, background: t.borderSoft, margin: '4px 2px' }}/>
            <TrayItem t={t}>Quit <span style={{ color: t.fgFaint, fontSize: 10, marginLeft: 'auto', fontFamily: t.fontMono }}>⌘Q</span></TrayItem>
          </div>
          <style>{`
            @keyframes trayIn {
              from { opacity: 0; transform: translateY(6px); }
              to { opacity: 1; transform: none; }
            }
          `}</style>
        </div>
      )}
    </>
  );
}

function TrayHeader({ t, app }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 10,
      padding: '10px 12px 8px',
      borderBottom: `1px solid ${t.borderSoft}`,
      marginBottom: 4,
    }}>
      <div style={{
        width: 28, height: 28, borderRadius: 6,
        background: t.accent, color: '#fff',
        display: 'grid', placeItems: 'center',
        fontWeight: 700, fontSize: 14,
      }}>✦</div>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 12.5, fontWeight: 600 }}>Smart Clipboard</div>
        <div style={{ fontSize: 10.5, color: t.fgFaint, fontFamily: t.fontMono }}>
          {app.items.length} items · local
        </div>
      </div>
    </div>
  );
}

function TrayItem({ t, children, onClick, kbd }) {
  return (
    <div
      onClick={onClick}
      style={{
        display: 'flex', alignItems: 'center',
        padding: '7px 10px',
        fontSize: 12.5,
        color: t.fg,
        cursor: onClick ? 'pointer' : 'default',
        borderRadius: 5,
      }}
      onMouseEnter={e => onClick && (e.currentTarget.style.background = t.bgHover)}
      onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
    >
      <span style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 6 }}>{children}</span>
      {kbd && <span style={{ color: t.fgFaint, fontSize: 10.5, fontFamily: t.fontMono }}>{kbd}</span>}
    </div>
  );
}

function TaskIcon({ t, children, active }) {
  return (
    <div style={{
      width: 36, height: 36, borderRadius: 6,
      display: 'grid', placeItems: 'center',
      cursor: 'pointer',
      position: 'relative',
      background: active ? (t.dark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.04)') : 'transparent',
    }}>
      {children}
      {active && <div style={{
        position: 'absolute', bottom: 3, left: '50%', transform: 'translateX(-50%)',
        width: 12, height: 2, borderRadius: 1, background: t.accent,
      }}/>}
    </div>
  );
}

// ── Toast ────────────────────────────────────────────────
function Toast({ t, toast }) {
  const ICON = { copy: '✓', pin: '★', delete: '⌫', info: '·' };
  return (
    <div style={{
      position: 'absolute', bottom: 72, left: '50%',
      transform: 'translateX(-50%)',
      padding: '10px 16px',
      background: t.dark ? 'rgba(30,30,36,0.92)' : 'rgba(20,20,30,0.92)',
      color: '#fff',
      borderRadius: 999,
      fontSize: 12.5, fontWeight: 500,
      display: 'flex', alignItems: 'center', gap: 10,
      boxShadow: '0 12px 40px rgba(0,0,0,0.35)',
      animation: 'toastIn 220ms cubic-bezier(.2,.9,.3,1.1)',
      fontFamily: t.fontUi,
      zIndex: 1000,
      border: `1px solid rgba(255,255,255,0.08)`,
    }}>
      <span style={{
        width: 18, height: 18, borderRadius: 999,
        background: t.accent,
        display: 'grid', placeItems: 'center',
        fontSize: 11, fontWeight: 700,
      }}>{ICON[toast.kind] || '·'}</span>
      <span>{toast.msg}</span>
      <style>{`
        @keyframes toastIn {
          from { opacity: 0; transform: translate(-50%, 8px); }
          to { opacity: 1; transform: translate(-50%, 0); }
        }
      `}</style>
    </div>
  );
}

// ── Tweaks panel ─────────────────────────────────────────
function TweaksPanel({ tweaks, update }) {
  return (
    <div style={{
      position: 'fixed', right: 20, bottom: 80,
      width: 280,
      background: 'rgba(24,24,28,0.96)', color: '#eee',
      borderRadius: 12,
      border: '1px solid rgba(255,255,255,0.1)',
      boxShadow: '0 20px 60px rgba(0,0,0,0.5)',
      padding: 16,
      fontFamily: "'Geist', system-ui, sans-serif",
      fontSize: 12.5,
      zIndex: 10000,
      backdropFilter: 'blur(20px)',
    }}>
      <div style={{
        fontSize: 11, letterSpacing: 1.5, textTransform: 'uppercase',
        fontWeight: 600, color: '#bbb', marginBottom: 12,
        fontFamily: "'Geist Mono', ui-monospace, monospace",
      }}>Tweaks</div>
      <TwRow label="Theme">
        {['dark', 'light'].map(v => <TwChip key={v} active={tweaks.theme === v} onClick={() => update('theme', v)}>{v}</TwChip>)}
      </TwRow>
      <TwRow label="Accent hue">
        <input type="range" min={0} max={360} step={5} value={tweaks.accentHue}
          onChange={e => update('accentHue', +e.target.value)}
          style={{ flex: 1, accentColor: `oklch(62% 0.19 ${tweaks.accentHue})` }}/>
        <span style={{ fontFamily: 'Geist Mono, monospace', fontSize: 11, width: 32, textAlign: 'right' }}>{tweaks.accentHue}°</span>
      </TwRow>
      <TwRow label="Density">
        {['comfy', 'compact'].map(v => <TwChip key={v} active={tweaks.density === v} onClick={() => update('density', v)}>{v}</TwChip>)}
      </TwRow>
      <TwRow label="Category">
        {['chip', 'icon', 'dot'].map(v => <TwChip key={v} active={tweaks.categoryDisplay === v} onClick={() => update('categoryDisplay', v)}>{v}</TwChip>)}
      </TwRow>
      <TwRow label="AI labels">
        {[true, false].map(v => <TwChip key={String(v)} active={tweaks.showLabels === v} onClick={() => update('showLabels', v)}>{v ? 'show' : 'hide'}</TwChip>)}
      </TwRow>
      <TwRow label="Preview">
        {['split', 'inline'].map(v => <TwChip key={v} active={tweaks.previewMode === v} onClick={() => update('previewMode', v)}>{v}</TwChip>)}
      </TwRow>
      <TwRow label="Font">
        {['geist', 'inter', 'ibm', 'system'].map(v => <TwChip key={v} active={tweaks.fontPair === v} onClick={() => update('fontPair', v)}>{v}</TwChip>)}
      </TwRow>
    </div>
  );
}
function TwRow({ label, children }) {
  return (
    <div style={{ marginBottom: 12 }}>
      <div style={{
        fontSize: 10.5, color: '#888', marginBottom: 6,
        letterSpacing: 1, textTransform: 'uppercase', fontWeight: 500,
        fontFamily: "'Geist Mono', ui-monospace, monospace",
      }}>{label}</div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, alignItems: 'center' }}>{children}</div>
    </div>
  );
}
function TwChip({ active, onClick, children }) {
  return (
    <button onClick={onClick} style={{
      padding: '4px 9px', fontSize: 11, fontFamily: 'inherit', fontWeight: 500,
      background: active ? 'rgba(255,255,255,0.12)' : 'transparent',
      color: active ? '#fff' : '#999',
      border: `1px solid ${active ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.08)'}`,
      borderRadius: 5, cursor: 'pointer', textTransform: 'lowercase',
    }}>{children}</button>
  );
}

Object.assign(window, { App });

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
