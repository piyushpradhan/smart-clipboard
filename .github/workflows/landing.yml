name: Landing Page

# Deploy the marketing site at landing/ to GitHub Pages.
#
# Triggers:
#   - Push to main when files under landing/ change
#   - Manual dispatch
#
# Output:
#   - Site published at https://piyushpradhan.github.io/recall/

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/landing.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing/package-lock.json

      - run: npm ci

      - name: Build Astro site
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
