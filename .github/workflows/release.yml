name: Release

# Cross-platform installer build.
#
# Triggers:
#   - Pushing a tag that starts with "v" (e.g. v0.1.0, v1.0.0-rc1) — publishes
#     a draft GitHub Release with installers attached for every platform.
#   - Manual dispatch — builds + uploads artifacts without creating a release.
#
# Outputs per platform:
#   - windows-latest : .msi + .exe (NSIS)
#   - macos-latest   : .dmg + .app.tar.gz (universal-ish — arm64 runner)
#   - ubuntu-22.04   : .AppImage + .deb

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm ci

      - name: Build Tauri release bundles
        run: npm run tauri -- build --target ${{ matrix.target }}

      - name: Upload build artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: smart-clipboard-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*setup.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Attach to GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*setup.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
