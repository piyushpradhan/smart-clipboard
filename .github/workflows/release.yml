name: Release

# Cross-platform installer build.
#
# Triggers:
#   - Pushing a tag that starts with "v" (e.g. v0.1.0, v1.0.0-rc1) — publishes
#     a draft GitHub Release with installers attached for every platform.
#   - Pushing a branch named "release/vX.Y.Z" — same as above, creates the tag
#     automatically if it doesn't exist.
#   - Manual dispatch with a tag_name input — builds + creates a draft release.
#
# Outputs per platform:
#   - windows-latest : .msi + .exe (NSIS)
#   - macos-latest   : .dmg + .app.tar.gz (universal-ish — arm64 runner)
#   - ubuntu-22.04   : .AppImage + .deb

on:
  push:
    tags: ['v*']
    branches: ['release/v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v0.5.0)'
        required: true

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - name: Compute release tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/heads/release/v* ]]; then
            echo "tag=${GITHUB_REF#refs/heads/release/}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          elif [[ -n "${{ github.event.inputs.tag_name }}" ]]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "tag=" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

  check:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Frontend tests
        run: npm test

  build:
    needs: [prepare, check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
            bundles: nsis
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos
            bundles: ''
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux
            bundles: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm ci

      - name: Build Tauri release bundles
        shell: bash
        run: |
          if [ -n "${{ matrix.bundles }}" ]; then
            npm run tauri -- build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          else
            npm run tauri -- build --target ${{ matrix.target }}
          fi

      - name: Upload build artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: smart-clipboard-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*setup.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Attach to GitHub Release
        if: needs.prepare.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*setup.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
